name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Ghostscript sidecar
        shell: pwsh
        run: |
          choco install ghostscript -y --no-progress

          $ghostscript = Get-ChildItem "C:\Program Files\gs" -Recurse -Filter "gswin64c.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (!$ghostscript) {
            Write-Error "Could not find gswin64c.exe after installing Ghostscript."
          }

          $sidecar = "src-tauri/binaries/pdf-shrinker-ghostscript-x86_64-pc-windows-msvc.exe"
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          Copy-Item $ghostscript.FullName $sidecar -Force
          Write-Host "Prepared Windows Ghostscript sidecar at $sidecar"

      - name: Build Windows installer
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-shrinker-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
