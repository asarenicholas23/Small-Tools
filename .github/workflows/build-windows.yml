name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Ghostscript sidecar
        shell: pwsh
        run: |
          $ghostscriptVersion = "10071"
          $downloadUrl = "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs$ghostscriptVersion/gs$ghostscriptVersion" + "w64.exe"
          $installer = "$env:RUNNER_TEMP\ghostscript.exe"
          $extractDir = "$env:RUNNER_TEMP\ghostscript"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $installer
          7z x $installer "-o$extractDir" -y

          $ghostscript = Get-ChildItem $extractDir -Recurse -Filter "gswin64c.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (!$ghostscript) {
            Write-Error "Could not find gswin64c.exe after extracting Ghostscript."
          }

          $ghostscriptRoot = Split-Path (Split-Path $ghostscript.FullName -Parent) -Parent
          $sidecar = "src-tauri/binaries/pdf-shrinker-ghostscript-x86_64-pc-windows-msvc.exe"
          $runtime = "src-tauri/ghostscript"
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          New-Item -ItemType Directory -Force -Path $runtime | Out-Null
          Copy-Item $ghostscript.FullName $sidecar -Force
          Copy-Item "$ghostscriptRoot\bin" $runtime -Recurse -Force
          Copy-Item "$ghostscriptRoot\lib" $runtime -Recurse -Force
          if (Test-Path "$ghostscriptRoot\Resource") {
            Copy-Item "$ghostscriptRoot\Resource" $runtime -Recurse -Force
          }
          Write-Host "Prepared Windows Ghostscript sidecar at $sidecar"
          Write-Host "Prepared Windows Ghostscript runtime at $runtime"

      - name: Build Windows installer
        id: build
        shell: pwsh
        run: |
          $log = "$env:RUNNER_TEMP\windows-build.log"
          $env:TAURI_CONFIG = '{"bundle":{"resources":{"ghostscript/":"ghostscript/"}}}'
          cmd /c "npm run tauri build -- --bundles nsis" 2>&1 | Tee-Object -FilePath $log
          $code = $LASTEXITCODE
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit 0

      - name: Upload Windows artifacts
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-shrinker-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-shrinker-windows-build-log
          path: ${{ runner.temp }}/windows-build.log

      - name: Fail if Windows build failed
        if: steps.build.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1
